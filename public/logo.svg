    stroke-linecap="round"
    opacity="0.7"
  />

  <!-- Node Dot -->
  <circle cx="575" cy="580" r="14" fill="#A855F7"/>
  <circle cx="575" cy="580" r="5" fill="#FFFFFF"/>

  <!-- Premium Frame -->
  <rect
    x="210"
    y="210"
    width="480"
    height="480"
    rx="150"
    fill="none"
    stroke="#A855F7"
    stroke-opacity="0.08"
    stroke-width="2"
  />

</svg>