<svg width="900" height="900" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">

  <!-- Glow Effect -->
  <circle cx="450" cy="450" r="320" fill="#7C3AED" opacity="0.14"/>
  <circle cx="450" cy="450" r="220" fill="#A855F7" opacity="0.08"/>

  <!-- Main Logo Container -->
  <rect
    x="230"
    y="230"
    width="440"
    height="440"
    rx="140"
    fill="#120A1F"
  />

  <!-- FZ Core Shape -->
  <path
    d="M340 340 H560
       M340 450 H500
       M340 340 V560
       M500 450 V560"
    stroke="#FFFFFF"
    stroke-width="50"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Main Purple Slash -->
  <path
    d="M575 320 L430 570"
    stroke="#A855F7"
    stroke-width="42"
    stroke-linecap="round"
  />

  <!-- Secondary Accent Slash -->
  <path
    d="M520 320 L400 520"
    stroke="#7C3AED"
